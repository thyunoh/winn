<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WinCheck+</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}
iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #666;
}
</style>
</head>
<body>
<div id="loading">Loading...</div>
<iframe id="mainFrame" src="/user/index.do" onload="document.getElementById('loading').style.display='none';"></iframe>
<script>
console.log('[app.html] iframe src:', document.getElementById('mainFrame').src);
document.getElementById('mainFrame').addEventListener('error', function(e) {
    console.error('[app.html] iframe error:', e);
});
</script>
</body>
</html>
